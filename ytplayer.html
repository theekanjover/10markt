<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>YouTube Player</title>

    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: Segoe UI, sans-serif;
        }

        /* Main video WebView */
        #playerWebView {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            visibility: hidden; /* UWP-safe */
        }

        #error {
            color: white;
            padding: 20px;
            display: none;
        }

        /* Floating chat button */
        #chatBtn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.15);
            color: white;
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            display: none;
            z-index: 50;
        }

        /* Chat panel wrapper (safe to animate) */
        #chatWrapper {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: #111;
            border-left: 1px solid #333;
            transition: right 0.25s ease;
            z-index: 40;
        }

        /* Chat WebView (never animate directly) */
        #chatWebView {
            width: 100%;
            height: 100%;
            border: none;
        }

        .open {
            right: 0 !important;
        }
    </style>
</head>
<body>

<x-ms-webview id="playerWebView"></x-ms-webview>
<div id="error">unable to connect</div>

<button id="chatBtn">Chat</button>

<div id="chatWrapper">
    <x-ms-webview id="chatWebView"></x-ms-webview>
</div>

<script>
(function () {
    "use strict";

    var params = new URLSearchParams(window.location.search);
    var videoId = params.get("id");

    var player = document.getElementById("playerWebView");
    var error = document.getElementById("error");
    var chatBtn = document.getElementById("chatBtn");
    var chatWrapper = document.getElementById("chatWrapper");
    var chatWebView = document.getElementById("chatWebView");

    if (!videoId) {
        error.style.display = "block";
        return;
    }

    // Load video
    var embedUrl = "https://www.youtube.com/embed/" + encodeURIComponent(videoId);
    player.navigate(embedUrl);

    player.addEventListener("MSWebViewNavigationCompleted", function (ev) {
        if (ev.isSuccess) {
            player.style.visibility = "visible";
        } else {
            error.style.display = "block";
        }
    });

    // Detect live stream
    var oembedUrl = "https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=" 
                    + encodeURIComponent(videoId) + "&format=json";

    fetch(oembedUrl)
        .then(function (res) { return res.json(); })
        .then(function (data) {
            if (data && data.live_broadcast === "live") {
                chatBtn.style.display = "block";

                var chatUrl =
                    "https://www.youtube.com/live_chat?v=" + encodeURIComponent(videoId) +
                    "&embed_domain=" + location.hostname;

                chatWebView.navigate(chatUrl);
            }
        })
        .catch(function () {
            // ignore
        });

    // Toggle chat panel (animate wrapper, NOT WebView)
    chatBtn.onclick = function () {
        chatWrapper.classList.toggle("open");
    };
})();
</script>

</body>
</html>
